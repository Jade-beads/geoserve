server:
  # 当前初始化服务的本地端口，不是 GeoServer 端口。
  port: 8081

geoserver:
  # GeoServer 根地址。代码会在该地址后拼接 /rest/* 和 /gwc/rest/*。
  base-url: ${GEOSERVER_BASE_URL:http://localhost:8080/geoserver}
  # GeoServerRestClient 使用的 Basic 认证凭据。
  username: ${GEOSERVER_USERNAME:}
  password: ${GEOSERVER_PASSWORD:}
  # 所有初始化资源统一使用这个工作区。
  workspace: ${GEOSERVER_WORKSPACE:site_selection}
  init:
    # false 表示只在调用 POST /api/geoserver/init 时执行初始化。
    run-on-startup: ${GEOSERVER_INIT_RUN_ON_STARTUP:false}

  # 步骤 1：创建缺失的 site_selection workspace。
  # 步骤 2：上传 SLD 文件，创建工作区内样式。
  styles:
    - name: count_style
      # 人口数量样式，按 total_num 字段渲染。
      sld-location: classpath:styles/count-style.sld
    - name: price_style
      # 价格样式，按 total_num 字段渲染。
      sld-location: classpath:styles/price-style.sld

  # 步骤 3：创建缺失的 GeoServer datastore。GaussDB/openGauss 使用 postgis 兼容方式。
  datastore:
    name: gauss_store
    description: GaussDB PostGIS-compatible datastore
    host: ${GAUSS_DB_HOST:localhost}
    port: ${GAUSS_DB_PORT:5432}
    database: ${GAUSS_DB_NAME:gisdb}
    schema: ${GAUSS_DB_SCHEMA:public}
    username: ${GAUSS_DB_USERNAME:}
    password: ${GAUSS_DB_PASSWORD:}
    dbtype: postgis

  # 步骤 4：发布缺失的 FeatureType/Layer，并按需配置 GWC/WMTS。
  layers:
    - name: basic_all
      title: 基础全量
      source-type: SQL_VIEW
      sql-location: classpath:sql/basic_all.sql
      batch-id-default: ${BASIC_ALL_BATCH_ID_DEFAULT:1001}
      srs: EPSG:4326
      geometry:
        name: geom_polygon
        type: Polygon
        srid: 4326
      default-style: count_style
      wmts:
        # basic_all 是唯一需要发布 WMTS 的参数化瓦片图层。
        enabled: true
        gridsets:
          - EPSG:3857
        formats:
          - image/png
        parameter-filters:
          - type: regex
            key: VIEWPARAMS
            default-value: "batchId:${BASIC_ALL_BATCH_ID_DEFAULT:1001}"
            regex: "^batchId:[0-9]+$"

    - name: basic
      title: 基础标签
      source-type: SQL_VIEW
      sql-location: classpath:sql/basic.sql
      batch-id-default: ${BASIC_BATCH_ID_DEFAULT:1001}
      srs: EPSG:4326
      geometry:
        name: geom_polygon
        type: Polygon
        srid: 4326
      default-style: count_style
      sql-parameters:
        - name: county
          default-value: "-1"
          regexp-validator: "^(-1|[0-9]+)$"
        - name: ptype
          default-value: all
          regexp-validator: "^(all|[A-Za-z0-9_-]+(\\|[A-Za-z0-9_-]+)*)$"
        - name: age
          default-value: all
          regexp-validator: "^(all|[A-Za-z0-9_-]+(\\|[A-Za-z0-9_-]+)*)$"
        - name: gender
          default-value: all
          regexp-validator: "^(all|[A-Za-z0-9_-]+(\\|[A-Za-z0-9_-]+)*)$"

    - name: scene
      title: 场景标签
      source-type: SQL_VIEW
      sql-location: classpath:sql/scene.sql
      batch-id-default: ${SCENE_BATCH_ID_DEFAULT:1001}
      srs: EPSG:4326
      geometry:
        name: geom_polygon
        type: Polygon
        srid: 4326
      default-style: count_style
      sql-parameters:
        - name: county
          default-value: "-1"
          regexp-validator: "^(-1|[0-9]+)$"
        - name: ptype
          default-value: all
          regexp-validator: "^(all|[A-Za-z0-9_-]+(\\|[A-Za-z0-9_-]+)*)$"

    - name: finance_app
      title: 金融 app
      source-type: SQL_VIEW
      sql-location: classpath:sql/finance_app.sql
      batch-id-default: ${FINANCE_APP_BATCH_ID_DEFAULT:1001}
      srs: EPSG:4326
      geometry:
        name: geom_polygon
        type: Polygon
        srid: 4326
      default-style: count_style
      sql-parameters:
        - name: county
          default-value: "-1"
          regexp-validator: "^(-1|[0-9]+)$"
        - name: ptype
          default-value: all
          regexp-validator: "^(all|[A-Za-z0-9_-]+(\\|[A-Za-z0-9_-]+)*)$"

    - name: land_val
      title: 房价租金
      source-type: SQL_VIEW
      sql-location: classpath:sql/land_val.sql
      batch-id-default: ${LAND_VAL_BATCH_ID_DEFAULT:1001}
      srs: EPSG:4326
      geometry:
        name: geom_polygon
        type: Polygon
        srid: 4326
      default-style: price_style
      sql-parameters:
        - name: county
          default-value: "-1"
          regexp-validator: "^(-1|[0-9]+)$"
        - name: ptype
          default-value: all
          regexp-validator: "^(all|[A-Za-z0-9_-]+(\\|[A-Za-z0-9_-]+)*)$"
